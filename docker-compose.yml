services:
  postgres:
    image: postgres:15-alpine
    container_name: game-store-postgres
    environment:
      POSTGRES_DB: gamestore
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: game-store-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: game-store-backend
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_USER: dev
      DB_PASSWORD: devpass
      DB_NAME: gamestore
      REDIS_HOST: redis

  frontend:
    build: ./frontend
    container_name: game-store-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
