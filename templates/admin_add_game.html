{% extends "base.html" %}
{% block content %}
<h1 class="h4 mb-3">Добавление игры</h1>
<form method="post" class="card p-3 bg-dark-subtle border-secondary">
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Название</label>
            <input class="form-control" name="name" required>
        </div>
        <div class="col-md-3">
            <label class="form-label">Цена (₽)</label>
            <input class="form-control" type="number" min="0.01" step="0.01" name="price" required>
        </div>
        <div class="col-md-3">
            <label class="form-label">Год релиза</label>
            <input class="form-control" type="number" min="1980" max="2030" name="release_year" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Категория</label>
            <input class="form-control" name="category" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Разработчик</label>
            <input class="form-control" name="developer" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">URL картинки</label>
            <input class="form-control" name="image_url" required>
        </div>
        <div class="col-12">
            <label class="form-label">Описание (100+ символов)</label>
            <textarea class="form-control" name="description" rows="5" required></textarea>
        </div>
    </div>
    <div class="mt-3 d-flex gap-2">
        <button class="btn btn-primary">Сохранить</button>
        <a class="btn btn-outline-light" href="{{ url_for('admin') }}">Отмена</a>
    </div>
</form>
{% endblock %}
