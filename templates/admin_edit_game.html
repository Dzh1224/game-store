{% extends "base.html" %}
{% block content %}
<h1 class="h4 mb-3">Редактирование игры #{{ game.id }}</h1>
<div class="alert alert-info" role="alert">
    Вы редактируете главную карточку: <strong>{{ base_name }}</strong> (изданий: {{ versions_count }}).
    Если указать новую картинку URL или загрузить файл, она применится ко всем изданиям этой игры.
</div>
<form method="post" enctype="multipart/form-data" class="card p-3 bg-dark-subtle border-secondary">
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Название</label>
            <input class="form-control" name="name" value="{{ game.name }}" required>
        </div>
        <div class="col-md-3">
            <label class="form-label">Цена (₽)</label>
            <input class="form-control" type="number" min="0.01" step="0.01" name="price" value="{{ game.price }}" required>
        </div>
        <div class="col-md-3">
            <label class="form-label">Год релиза</label>
            <input class="form-control" type="number" min="1980" max="2030" name="release_year" value="{{ game.release_year }}" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Категория</label>
            <input class="form-control" name="category" value="{{ game.category }}" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">Разработчик</label>
            <input class="form-control" name="developer" value="{{ game.developer }}" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">URL картинки</label>
            <input class="form-control" name="image_url" value="{{ game.image_url }}" placeholder="/static/images/games/my-game.jpg или https://...">
        </div>
        <div class="col-md-4">
            <label class="form-label">Загрузить новый файл</label>
            <input class="form-control" type="file" name="image_file" accept=".png,.jpg,.jpeg,.webp,.gif">
        </div>
        <div class="col-12">
            <label class="form-label">Описание (100+ символов)</label>
            <textarea class="form-control" name="description" rows="5" required>{{ game.description }}</textarea>
        </div>
    </div>
    <div class="mt-3 d-flex gap-2">
        <button class="btn btn-primary">Сохранить изменения</button>
        <a class="btn btn-outline-light" href="{{ url_for('admin') }}">Отмена</a>
    </div>
</form>
{% endblock %}
